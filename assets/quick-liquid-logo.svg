<svg width="760" height="220" viewBox="0 0 760 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">QuickLiquid logo</title>
  <desc id="desc">A refractive glass droplet next to the QuickLiquid wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="20" x2="720" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F7FF"/>
      <stop offset="0.48" stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#EAF2FF"/>
    </linearGradient>
    <linearGradient id="drop" x1="83" y1="28" x2="174" y2="184" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#DDF6FF" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#9FD6FF" stop-opacity="0.54"/>
    </linearGradient>
    <radialGradient id="spec" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(94 72) rotate(49) scale(60 24)">
      <stop stop-color="#FFFFFF"/>
