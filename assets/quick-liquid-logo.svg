    <path d="M91 134C91 106 118 70 126 58C137 75 164 110 164 135C164 160 149 176 128 176C107 176 91 160 91 134Z" stroke="#76C7FF" stroke-opacity="0.45" stroke-width="2"/>
    <path d="M82 122C93 126 105 127 118 122C136 115 150 116 166 124" stroke="#0EA5E9" stroke-opacity="0.22" stroke-width="12" stroke-linecap="round"/>
    <ellipse cx="101" cy="72" rx="38" ry="18" transform="rotate(-42 101 72)" fill="url(#spec)"/>
    <circle cx="155" cy="88" r="7" fill="#FFFFFF" fill-opacity="0.88"/>
